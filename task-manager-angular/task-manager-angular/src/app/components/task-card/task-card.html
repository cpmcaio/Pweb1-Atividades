<div
  class="p-3 rounded bg-white shadow-sm cursor-move"
  [class.opacity-70]="dragging()"
  draggable="true"
  (dragstart)="onDragStart($event)"
  (dragend)="onDragEnd()"
>
  <div class="flex items-start justify-between gap-2">
    <div class="flex items-center gap-3">
      <span [class]="'dot ' + (task.due | proximityColor)" title="Proximidade"></span>
      <div>
        <div class="font-semibold text-slate-800">{{ task.title }}</div>
        <div class="text-xs text-slate-500">Término: {{ task.due }} • {{ levelLabel(task.level) }}</div>
      </div>
    </div>
    <div class="text-right">
      <button class="text-xs text-slate-500 mr-2 btn-edit" (click)="editTask.emit(task)">Editar</button>
      <button class="text-xs text-red-500 btn-del" (click)="deleteTask.emit(task.id)">Excluir</button>
    </div>
  </div>
  <p class="mt-2 text-sm text-slate-600">{{ task.desc || '' }}</p>
</div>
